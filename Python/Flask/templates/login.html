<!DOCTYPE html>
{% extends 'index.html' %}
{% block title %}Přihlášení{% endblock title %}
{% block content %}
    <div class="content forms">
        <form action="{{url_for('login')}}" method="POST">
            {{ loginform.hidden_tag() }}
            {{ loginform.username(placeholder="Přihlašovací jméno") }}
            {{ loginform.password(placeholder="Heslo") }}
            {{ loginform.submit() }}
        </form>
    </div>
{% endblock content %}
